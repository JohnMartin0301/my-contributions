# update_contributions.yml
# Runs on every push to main and can be triggered manually.
# Runs update_contributions.py to fetch PRs, categorize contributions,
# and auto-regenerate README.md with the updated contribution tables.

name: 🔄 Auto-Update Contributions README

on:
  workflow_dispatch: # can be triggered manually from the Actions tab
  push:
    branches:
      - main # runs automatically on every push to main

jobs:
  update-readme:
    runs-on: ubuntu-latest

    # Write access needed to commit the updated README.md back to the repo
    permissions:
      contents: write

    steps:

      # Downloads the repo files onto the runner
      - name: 📥 Check out the repository
        uses: actions/checkout@v4

      # Installs Python 3.11 on the runner
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installs the requests library used by the script
      - name: 📦 Install Python dependencies
        run: pip install requests

      # Runs the contributions updater script
      # GITHUB_TOKEN is auto-provided by GitHub Actions — no setup needed
      - name: 🚀 Run the contributions updater script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_contributions.py

      # Commits and pushes the updated README.md back to the repo
      # Skips the commit if README.md didn't change
      - name: 💾 Commit and push updated README.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "🤖 Auto-update contributions [$(date +'%Y-%m-%d')]"
          git push
