# monitor_prs.yml
# Runs every hour via cron schedule.
# Checks all open PRs for new comments, reviews, and status changes.
# Sends a Discord + Gmail notification only when something changed.
# Commits last_checked.txt after each run to track the last check time.

name: 🔔 PR Activity Monitor

on:
  schedule:
    - cron: "0 * * * *" # runs every hour at the top of the hour
  workflow_dispatch: # can also be triggered manually from the Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest

    # Write access needed to commit last_checked.txt back to the repo
    permissions:
      contents: write

    steps:

      # Downloads the repo files onto the runner
      - name: 📥 Check out repository
        uses: actions/checkout@v4

      # Installs Python 3.11 on the runner
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installs the requests library used by the script
      - name: 📦 Install dependencies
        run: pip install requests

      # Runs the PR monitor script
      # Credentials are pulled from GitHub Secrets — never stored in code
      - name: 🚀 Run PR monitor
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GMAIL_SENDER:    ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER:  ${{ secrets.GMAIL_RECEIVER }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor_prs.py

      # Saves the current timestamp to last_checked.txt and commits it
      # Skips the commit if the file didn't change (no activity detected)
      - name: 💾 Save last-checked timestamp
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_checked.txt
          git diff --cached --quiet || git commit -m "🤖 Update PR monitor timestamp [$(date +'%Y-%m-%d %H:%M')]"
          git push
