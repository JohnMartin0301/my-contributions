# notify_issues.yml
# Triggered by cron-job.org every day at 9:00 AM Philippine time.
# Runs notify_issues.py to search for new GitHub issues and send
# a Discord notification and Gmail digest.

name: 🔔 Daily GitHub Issue Digest

on:
  workflow_dispatch: # can also be triggered manually from the Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:

      # Downloads the repo files onto the runner
      - name: 📥 Check out repository
        uses: actions/checkout@v4

      # Installs Python 3.13 on the runner
      - name: 🐍 Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installs the requests library used by the script
      - name: 📦 Install dependencies
        run: pip install requests

      # Runs the issue notifier script
      # Credentials are pulled from GitHub Secrets — never stored in code
      - name: 🚀 Run issue notifier
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GMAIL_SENDER:    ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER:  ${{ secrets.GMAIL_RECEIVER }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python notify_issues.py
