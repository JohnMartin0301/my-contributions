# ─────────────────────────────────────────────────────────────────
# notify-issues.yml
# ─────────────────────────────────────────────────────────────────
# This workflow runs notify_issues.py every morning at 9:00 AM
# of new GitHub issues matching contribution queries.
#
# File Location:
#   .github/workflows/notify-issues.yml
#   (same folder as the update-contributions.yml)
# ─────────────────────────────────────────────────────────────────

name: 🔔 Daily GitHub Issue Digest

on:
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:

      # STEP 1: Download repo files onto the virtual computer
      - name: 📥 Check out repository
        uses: actions/checkout@v4

      # STEP 2: Install Python
      - name: 🐍 Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # STEP 3: Install the 'requests' library our script needs
      - name: 📦 Install dependencies
        run: pip install requests

      # STEP 4: Run the notifier script
      # All 4 environment variables below come from GitHub Secrets
      # (Settings → Secrets and variables → Actions → New repository secret)
      #
      # GITHUB_TOKEN   → automatically provided by GitHub, no setup needed
      # GMAIL_SENDER   → Gmail address (e.g. yourname@gmail.com)
      # GMAIL_PASSWORD → Gmail App Password (NOT your regular password)
      # GMAIL_RECEIVER → where to send the digest (can be same as sender)
      - name: 🚀 Run issue notifier
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GMAIL_SENDER:    ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER:  ${{ secrets.GMAIL_RECEIVER }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python notify_issues.py
